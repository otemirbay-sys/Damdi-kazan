<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ДӘМДІ ҚАЗАН</title>
</head>
<body style="background-color: #2c1b10; color: #d4af37; font-family: sans-serif; margin: 0; padding: 20px; text-align: center;">

    <div style="margin-bottom: 20px;">
        <img src="logo.png" alt="ДӘМДІ ҚАЗАН" style="width: 120px; border-radius: 50%; border: 2px solid #d4af37;" onerror="this.style.display='none'">
    </div>

    <h1 style="border-bottom: 2px solid #d4af37; display: inline-block; padding-bottom: 10px; text-transform: uppercase;">ДӘМДІ ҚАЗАН</h1>

    <div style="max-width: 500px; margin: 20px auto; text-align: left;">
        
        <details style="border: 1px solid #d4af37; border-radius: 8px; margin-bottom: 10px; background: #3d2b1f; overflow: hidden;">
            <summary style="padding: 15px; cursor: pointer; font-weight: bold; background: #4e3629; color: #f1e5ac; list-style: none;">🍲 ПЕРВЫЕ БЛЮДА (Нажми)</summary>
            <div style="padding: 15px; background: #2c1b10;">
                <div style="display: flex; justify-content: space-between; border-bottom: 1px solid #444; padding: 8px 0;">
                    <span>Пельмени домашние</span><span style="font-weight: bold;">1590 〒</span>
                </div>
                <div style="display: flex; justify-content: space-between; border-bottom: 1px solid #444; padding: 8px 0;">
                    <span>Шорпа</span><span style="font-weight: bold;">1700 〒</span>
                </div>
                <div style="display: flex; justify-content: space-between; border-bottom: 1px solid #444; padding: 8px 0;">
                    <span>Борщ / Солянка</span><span style="font-weight: bold;">1700 〒</span>
                </div>
            </div>
        </details>

        <details style="border: 1px solid #d4af37; border-radius: 8px; margin-bottom: 10px; background: #3d2b1f; overflow: hidden;">
            <summary style="padding: 15px; cursor: pointer; font-weight: bold; background: #4e3629; color: #f1e5ac; list-style: none;">🍖 ВТОРЫЕ БЛЮДА (Нажми)</summary>
            <div style="padding: 15px; background: #2c1b10;">
                <div style="display: flex; justify-content: space-between; border-bottom: 1px solid #444; padding: 8px 0;">
                    <span>Манты (5 шт)</span><span style="font-weight: bold;">1800 〒</span>
                </div>
                <div style="display: flex; justify-content: space-between; border-bottom: 1px solid #444; padding: 8px 0;">
                    <span>Плов ташкентский</span><span style="font-weight: bold;">1800 〒</span>
                </div>
                <div style="display: flex; justify-content: space-between; border-bottom: 1px solid #444; padding: 8px 0;">
                    <span>Куырдак</span><span style="font-weight: bold;">3100 〒</span>
                </div>
            </div>
        </details>

        <details style="border: 1px solid #d4af37; border-radius: 8px; margin-bottom: 10px; background: #3d2b1f; overflow: hidden;">
            <summary style="padding: 15px; cursor: pointer; font-weight: bold; background: #4e3629; color: #f1e5ac; list-style: none;">🍜 ЛАГМАНЫ (Нажми)</summary>
            <div style="padding: 15px; background: #2c1b10;">
                <div style="display: flex; justify-content: space-between; border-bottom: 1px solid #444; padding: 8px 0;">
                    <span>Суйру / Гуйру</span><span style="font-weight: bold;">1690 〒</span>
                </div>
                <div style="display: flex; justify-content: space-between; border-bottom: 1px solid #444; padding: 8px 0;">
                    <span>Кабырга лагман</span><span style="font-weight: bold;">2700 〒</span>
                </div>
            </div>
        </details>

    </div>

    <p style="margin-top: 50px; font-size: 0.8em; opacity: 0.5;">Приятного аппетита!</p>

</body>
</html>
