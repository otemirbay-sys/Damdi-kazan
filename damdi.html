<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ДӘМДІ ҚАЗАН</title>
    <style>
        body { background: #2c1b10; color: #d4af37; font-family: sans-serif; text-align: center; padding: 20px; }
        h1 { border-bottom: 2px solid #d4af37; padding-bottom: 10px; }
        details { border: 1px solid #d4af37; margin: 10px auto; max-width: 400px; border-radius: 5px; background: #3d2b1f; }
        summary { padding: 15px; cursor: pointer; font-weight: bold; outline: none; }
        .content { padding: 10px; background: #2c1b10; text-align: left; }
        .item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #444; }
    </style>
</head>
<body>

    <h1>ДӘМДІ ҚАЗАН</h1>

    <details>
        <summary>ЗАВТРАКИ</summary>
        <div class="content">
            <div class="item"><span>Яйцо с колбасой</span><span>1200 〒</span></div>
            <div class="item"><span>Каши</span><span>600 〒</span></div>
        </div>
    </details>

    <details>
        <summary>ПЕРВЫЕ БЛЮДА</summary>
        <div class="content">
            <div class="item"><span>Пельмени</span><span>1590 〒</span></div>
            <div class="item"><span>Шорпа</span><span>1700 〒</span></div>
            <div class="item"><span>Лагман дом.</span><span>1690 〒</span></div>
            <div class="item"><span>Борщ</span><span>1700 〒</span></div>
        </div>
    </details>

    <details>
        <summary>ВТОРЫЕ БЛЮДА</summary>
        <div class="content">
            <div class="item"><span>Плов</span><span>1800 〒</span></div>
            <div class="item"><span>Манты (5 шт)</span><span>1800 〒</span></div>
            <div class="item"><span>Куырдак</span><span>3100 〒</span></div>
            <div class="item"><span>Дапанжи</span><span>1890 〒</span></div>
        </div>
    </details>

    <details>
        <summary>ЛАГМАНЫ</summary>
        <div class="content">
            <div class="item"><span>Суйру/Гуйру</span><span>1690 〒</span></div>
            <div class="item"><span>Кабырга</span><span>2700 〒</span></div>
        </div>
    </details>

    <p style="margin-top:20px; opacity:0.5;">Меню ДӘМДІ ҚАЗАН</p>

</body>
</html>
